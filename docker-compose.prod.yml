name: portfolio-production

services:
  db:
    image: postgres:16-alpine
    container_name: prod_portfolio_db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: prod_portfolio_backend
    restart: unless-stopped
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env.prod
    volumes:
      - prod_django_static:/app/staticfiles
    depends_on:
      - db

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: prod_portfolio_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - prod_django_static:/app/staticfiles
    depends_on:
      - backend

volumes:
  prod_postgres_data:
    name: prod_portfolio_pg_data
  prod_django_static:
    name: prod_portfolio_django_static