# docker-compose.yml  (Docker Compose v2)
name: portfolio-saas

services:
  db:
    image: postgres:16-alpine
    container_name: portfolio_db
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_admin -d portfolio_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: portfolio_backend
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
    container_name: portfolio_celery
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - ./backend:/app
    command: celery -A config worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: portfolio_frontend
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: portfolio_pg_data